<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Pages Test Site</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
            text-align: center;
            background-color: #f9f9f9;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button {
            background-color: #24292e;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #444;
        }
        .success-msg {
            margin-top: 15px;
            color: #28a745;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>🚀 GitHub Pages Test</h1>
        <p>If you can see this page, your basic website hosting is working perfectly!</p>
        
        <button id="testBtn">Click to Test JavaScript</button>
        <div id="output"></div>
    </div>

    <script>
        document.getElementById('testBtn').addEventListener('click', function() {
            const output = document.getElementById('output');
            output.innerHTML = '<p class="success-msg">🎉 JavaScript is running successfully!</p>';
        });
    </script>

</body>
</html>
